<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Track any IP address or domain and see its location on an interactive map. Built with Leaflet.js and vanilla JavaScript." />
  <meta property="og:title" content="IP Address Tracker" />
  <meta property="og:description" content="Geolocate any IP address or domain on an interactive map." />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
  <link rel="stylesheet" href="CSS/style.css" />
  <title>IP Address Tracker</title>
</head>

<body>
  <header>
    <h1>IP Address Tracker</h1>
    <form id="form" role="search">
      <label for="ip" class="sr-only">IP address or domain</label>
      <input type="text" id="ip" placeholder="Search for any IP address or domain" autocomplete="off" />
      <button type="submit" aria-label="Search">
        <svg xmlns="http://www.w3.org/2000/svg" width="11" height="14" aria-hidden="true">
          <path fill="none" stroke="#FFF" stroke-width="3" d="M2 1l6 6-6 6" />
        </svg>
      </button>
    </form>
    <small id="err" role="alert" aria-live="polite"></small>
    <div class="infos">
      <div class="spinner show" role="status" aria-label="Loading">
        <span class="sr-only">Loading...</span>
      </div>
      <div class="info">
        <small>IP Address</small>
        <p id="ip_addr">-</p>
      </div>
      <span class="sep hide" aria-hidden="true"></span>
      <div class="info">
        <small>Location</small>
        <p id="loc">-</p>
      </div>
      <span class="sep hide" aria-hidden="true"></span>
      <div class="info">
        <small>Timezone</small>
        <p id="time">-</p>
      </div>
      <span class="sep hide" aria-hidden="true"></span>
      <div class="info">
        <small>ISP</small>
        <p id="isp">-</p>
      </div>
    </div>
  </header>

  <div id="mapid" role="application" aria-label="Map showing IP location"></div>

  <footer class="attribution">
    Challenge by
    <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noopener noreferrer">Frontend Mentor</a>.
    Coded by <a href="https://github.com/karimseh" target="_blank" rel="noopener noreferrer">Karim SEHIMI</a>.
  </footer>

  <noscript>
    <p style="text-align:center;padding:2rem;">This app requires JavaScript to function. Please enable JavaScript in your browser.</p>
  </noscript>

  <script type="module" src="JS/app.js"></script>
</body>

</html>
